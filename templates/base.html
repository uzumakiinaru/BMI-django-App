<!DOCTYPE html>
<html>
<head>

<title>BMI Health Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->

{% if request.path != '/login/' and request.path != '/register/' %}
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">BMI Tracker</a>

        <div>
            <a href="/dashboard/" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/bmi/" class="btn btn-outline-light btn-sm">BMI Calculator</a>
            <a href="/history/" class="btn btn-outline-light btn-sm">History</a>

            <form action="/logout/" method="POST" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
{% endif %}
<!-- PAGE CONTENT -->

<div class="container mt-5">

{% block content %}

{% endblock %}

</div>

</body>
</html>
